<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alert 컴포넌트 샘플</title>

  <link rel="stylesheet" href="./alert.css">

  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 32px;
      color: #1a1a2e;
    }

    .demo-area {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .demo-label {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <h1>Alert 컴포넌트 샘플</h1>

  <div class="demo-area">

    <!-- 알림 있을 때 -->
    <div>
      <p class="demo-label">알림 있을 때</p>
      <div class="bell-wrapper" id="bellBtn">
        <svg class="auth-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
          fill="none" stroke="#1a1a2e" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round"
          width="24" height="24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="bell-badge">4</span>
      </div>
    </div>

    <!-- 알림 없을 때 -->
    <div>
      <p class="demo-label">알림 없을 때</p>
      <div class="bell-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
          fill="none" stroke="#1a1a2e" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round"
          width="24" height="24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="bell-badge hidden">0</span>
      </div>
    </div>

  </div>

  <!-- 알림 패널 마운트 -->
  <div id="alert-root"></div>

  <script src="./alert.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {

      await initAlert({
        triggerSelector: '#bellBtn',
        mountSelector: '#alert-root',
        alerts: [
          {
            type: 'like',
            title: '좋아요 알림',
            desc: '민주님이 회원님의 작업물에 좋아요를 눌렀어요.',
            href: '#'
          },
          {
            type: 'message',
            title: '1:1 문의사항 알림',
            desc: '회원님의 문의사항에 답글이 달렸어요.',
            href: '#'
          },
          {
            type: 'like',
            title: '좋아요 알림',
            desc: '민주님이 회원님의 작업물에 좋아요를 눌렀어요.',
            href: '#'
          },
          {
            type: 'like',
            title: '좋아요 알림',
            desc: '민주님이 회원님의 작업물에 좋아요를 눌렀어요.',
            href: '#'
          },
        ]
      });

    });
  </script>

</body>
</html>
