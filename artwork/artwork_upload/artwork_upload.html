<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>작업물 업로드</title>

  <link rel="stylesheet" href="/_common/button/button.css" />
  <link rel="stylesheet" href="/_common/top-banner/top-banner.css" />
  <link rel="stylesheet" href="/artwork/artwork_upload/artwork_upload.css" />
  <link rel="stylesheet" href="/_common/bottom-banner/bottom-banner.css" />

  <script type="module">
    import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@4.6.82/build/pdf.min.mjs";
  
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs";
  
    window.pdfjsLib = pdfjsLib;
  </script>
</head>
<body>
  <div id="top-banner" class="detail_AI-banner-root"></div>

  <div class="upload-page">

    <!-- 상단 입력 배너 -->
    <div class="artwork-hero-banner">

      <div class="artwork-hero-banner__eyebrow">
        작업물
        <div class="artwork-hero-banner__dot"></div>
        <span id="bannerMode">업로드</span>
      </div>

      <input
        class="artwork-hero-banner__title-input"
        id="titleInput"
        type="text"
        placeholder="제목을 입력해주세요"
        maxlength="80"
      />

      <p class="artwork-hero-banner__desc">
        <textarea
          class="artwork-hero-banner__desc-input"
          id="description"
          placeholder="작업물에 대해 설명해주세요."
          rows="2"
        ></textarea>
      </p>

      <div class="artwork-hero-banner__divider"></div>

      <div class="artwork-hero-banner__profile">
        <div class="artwork-hero-banner__profile-left">
          <div class="avatar">
            <div class="avatar__inner">
              <img id="profileImg" src="/media/profil.png" alt="프로필" />
            </div>
          </div>
          <div>
            <div class="name" id="profileName">사용자</div>
          </div>
        </div>
      </div>

      <div class="artwork-hero-banner__tag-wrap">
        <div class="artwork-hero-banner__tags" id="tagList"></div>
        <input
          class="artwork-hero-banner__tag-input"
          id="tagInput"
          type="text"
          placeholder="태그 입력 후 Enter"
          maxlength="30"
        />
      </div>

    </div>

    <!-- 파일 업로드 히어로 -->
    <section class="upload-hero">
      <div class="artwork-post__tool" id="toolPicker" role="button" tabindex="0" aria-label="툴 선택">
        <div class="artwork-post__tool-ic" aria-hidden="true">
          <img id="toolCardIcon" class="artwork-post__tool-icon-img" src="" alt="" />
          <span id="toolCardPlaceholderIcon" class="artwork-post__tool-placeholder-icon">📂</span>
        </div>

        <div class="artwork-post__tool-placeholder" id="toolPlaceholder">툴을 선택해주세요.</div>

        <div class="artwork-post__tool-meta" id="toolMeta" hidden>
          <div class="artwork-post__tool-top">
            <span class="artwork-post__tool-name" id="toolName"></span>
          </div>
          <div class="artwork-post__tool-brand" id="toolBrand"></div>
          <span class="artwork-post__tool-stars" id="toolStars" hidden></span>
        </div>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="drop-zone__empty" id="dropZoneEmpty">
          <p>첨부할 파일을 여기에 끌어다 놓거나, 버튼을 클릭하세요.</p>
          <p class="sub">지원 파일: mp4, mp3, jpg, jpeg, png, pdf, txt</p>
          <div id="fileUploadMount"></div>
        </div>

        <div class="preview-card" id="previewCard" hidden>
          <div class="preview-card__header">
            <div class="preview-card__filemeta">
              <div class="preview-card__badge" id="previewTypeBadge">FILE</div>
              <div class="preview-card__meta-texts">
                <div class="preview-card__filename" id="previewFileName">파일명</div>
                <div class="preview-card__filesize" id="previewFileSize">0 KB</div>
              </div>
            </div>

            <div class="preview-card__actions">
              <button type="button" class="preview-action-btn" id="replaceFileBtn">파일 변경</button>
              <button type="button" class="preview-action-btn preview-action-btn--danger" id="removeFileBtn">삭제</button>
            </div>
          </div>

          <div class="preview-card__body" id="previewBody"></div>
        </div>
      </div>
    </section>

    <!-- 취소/등록 버튼 -->
    <div class="upload-btn-row">
      <div id="cancelBtnMount" class="btn-wrap"></div>
      <div id="submitBtnMount" class="btn-wrap"></div>
    </div>

    <main class="card" id="mainCard" style="display:none;"></main>
  </div>

  <div id="bottom-banner"></div>

  <script src="/_common/button/button.js"></script>
  <script type="module" src="/_common/top-banner/include.js"></script>
  <script type="module" src="/artwork/artwork_upload/artwork_upload.js"></script>
  <script src="/_common/bottom-banner/include.js"></script>
</body>
</html>
