<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>작업물 라이브러리</title>

<link rel="stylesheet" href="/_common/background.css">
<link rel="stylesheet" href="/_common/select/select.css">
<link rel="stylesheet" href="/artwork/artwork_card/artwork-card.css">
<link rel="stylesheet" href="/_common/top-banner/top-banner.css">
<link rel="stylesheet" href="/_common/searchBar/searchBar.css">
<link rel="stylesheet" href="/artwork/artwork.css">
<link rel="stylesheet" href="/_common/bottom-banner/bottom-banner.css">

<!-- PDF.js -->
<script type="module">
  import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@4.6.82/build/pdf.min.mjs";

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://unpkg.com/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs";

  window.pdfjsLib = pdfjsLib;
</script>
</head>

<body class="artwork-page">

<div id="top-banner" class="detail_AI-banner-root"></div>

<div class="artwork-shell" id="artworkShell">

<header class="artwork-hero">
<div class="artwork-hero__box">

<div class="artwork-hero__left">
<div class="artwork-hero__index">작업물 라이브러리</div>
<h1 class="artwork-hero__heading">
아티스트가 되어<br>
상상력을<br>
펼쳐 주세요.
</h1>

<p class="artwork-hero__sub">
창의적인 작업물을 공유하고 영감을 나눠보세요.
</p>

<div id="search-area"></div>
</div>

<div class="artwork-hero__right">
<img class="artwork-hero__img" src="/media/artwork_banner.png" alt="">
<div class="artwork-hero__img-overlay"></div>
<div class="artwork-hero__img-fade"></div>
<div class="artwork-hero__caption">
  <div class="artwork-hero__caption-num">24</div>
  <div class="artwork-hero__caption-label">WORKS</div>
</div>
</div>

</div>
</header>

<main class="artwork-main">
<section class="artwork-section">
<div class="artwork-section__head">
  <div class="artwork-section__head-left">
    <div class="artwork-section__title">💙 좋아요 많은 작업물</div>
    <div class="artwork-section__desc">지금 인기있는 작업물들을 감상해보세요.</div>
  </div>
  <div id="select-root"></div>
</div>
<div class="artwork-grid" id="artworkGrid"></div>
</section>
</main>

</div>

<div id="bottom-banner"></div>

<!-- =========================
   카드 템플릿
========================= -->
<template id="artworkCardTpl">
  <article class="artwork-card">
    <div class="artwork-card__media">

      <div class="artwork-card__preview" data-art-preview></div>

      <div class="artwork-card__tool">
        <a class="artwork-card__tool-icLink">
          <img class="artwork-card__tool-ic" data-art-tool-icon>
        </a>

        <div class="artwork-card__tool-meta">
          <div class="artwork-card__tool-top">
            <span class="artwork-card__tool-name" data-tool-name></span>
          </div>
          <!-- ✅ 개발사 → 별점 순서 -->
          <div class="artwork-card__tool-brand" data-tool-brand></div>
          <span class="artwork-card__tool-stars" data-tool-stars></span>
        </div>
      </div>

      <div class="artwork-card__actions">
        <button class="artwork-card__action artwork-card__action--icon" data-art-like>
          <img class="artwork-card__action-img" src="/media/heart.png" alt="">
          <span class="artwork-card__action-count" data-art-like-count></span>
        </button>
        <button class="artwork-card__action artwork-card__action--icon" data-art-comment>
          <img class="artwork-card__action-img" src="/media/comment.png" alt="">
          <span class="artwork-card__action-count" data-art-comment-count></span>
        </button>
      </div>

    </div>

    <div class="artwork-card__panel">
      <div class="artwork-card__profile">
        <div class="artwork-card__avatar-ring">
          <img class="artwork-card__avatar" data-art-avatar>
        </div>
        <div class="artwork-card__user" data-art-user></div>
      </div>
      <div class="artwork-card__content">
        <div class="artwork-card__date" data-art-date></div>
        <p class="artwork-card__text" data-art-text></p>
      </div>
    </div>
  </article>
</template>

<script src="/_common/searchBar/searchBar.js"></script>
<script type="module" src="/_common/top-banner/include.js"></script>
<script type="module" src="/artwork/artwork.js"></script>
<script src="/_common/bottom-banner/include.js"></script>

</body>
</html>
