<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools 테이블 테스트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #7c6ef7;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      padding: 2rem;
    }

    .header {
      margin-bottom: 2rem;
    }

    .title {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
    }

    .status {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead {
      background: #1a1a24;
    }

    th {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.85rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid #1e1e28;
      vertical-align: top;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #16161f; }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(124,110,247,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      color: #f87171;
      padding: 2rem;
      font-size: 0.9rem;
    }

    .count {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <p class="title">Supabase · Tools Table</p>
    <h1>Tools 목록</h1>
    <p class="status" id="status">불러오는 중...</p>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody">
        <tr><td colspan="100" class="loading"><span class="spinner"></span>데이터 로딩 중</td></tr>
      </tbody>
    </table>
  </div>

  <p class="count" id="count"></p>

  <script type="module">
    import { supabase } from './_ignore/supabase.js'

    const status = document.getElementById('status')
    const thead = document.getElementById('thead')
    const tbody = document.getElementById('tbody')
    const count = document.getElementById('count')

    const { data, error } = await supabase
      .from('tools')
      .select('*')

    if (error) {
      tbody.innerHTML = `<tr><td class="error">오류: ${error.message}</td></tr>`
      status.textContent = '오류 발생'
    } else if (!data || data.length === 0) {
      tbody.innerHTML = `<tr><td class="loading">데이터 없음</td></tr>`
      status.textContent = '데이터 없음'
    } else {
      const cols = Object.keys(data[0])
      thead.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`
      tbody.innerHTML = data.map(row =>
        `<tr>${cols.map(c => `<td title="${row[c] ?? ''}">${row[c] ?? '-'}</td>`).join('')}</tr>`
      ).join('')
      status.textContent = '연결 성공 ✓'
      status.style.color = '#4fd1c5'
      count.textContent = `총 ${data.length}개`
    }
  </script>
</body>
</html>
