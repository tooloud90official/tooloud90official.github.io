<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이메일 회원가입</title>

  <link rel="stylesheet" href="/login2/login2.css">
  <link rel="stylesheet" href="/_common/top-banner/top-banner.css">
  <link rel="stylesheet" href="/_common/signup_status/signup_status.css">
  <link rel="stylesheet" href="/_common/confirm/confirm.css">
  <link rel="stylesheet" href="/_common/button/button.css"> <!-- 버튼 스타일 -->
</head>

<body>

  <div id="top-banner"></div>
  <div id="signup-status" data-step="1"></div>

  <main class="signup-container">

    <h1 class="title">이메일 회원가입</h1>

    <div class="form-group">
      <label>이메일 주소 입력</label>
      <div class="email-wrap">
        <input type="text" id="emailId" placeholder="이메일 입력창">
        <span>@</span>
        <select id="emailDomain">
          <option value="">이메일 주소 선택</option>
          <option value="gmail.com">gmail.com</option>
          <option value="naver.com">naver.com</option>
          <option value="icloud.com">icloud.com</option>
          <option value="direct">직접 입력</option>
        </select>
        <input type="text" id="emailCustom" placeholder="직접 입력" style="display:none;">
      </div>
    </div>

    <div class="form-group">
      <label>비밀번호 입력</label>
      <input type="password" id="password">
    </div>

    <div class="form-group">
      <label>비밀번호 재입력</label>
      <input type="password" id="passwordConfirm">
    </div>

    <!-- ✅ 공통 버튼 들어갈 자리 -->
    <div id="signup-button"></div>

    <div class="back-link" id="backBtn">
      ← 이전으로 돌아가기
    </div>

  </main>

  <!-- 공통 컴포넌트 -->
  <script src="/_common/top-banner/include.js"></script>
  <script src="/_common/signup_status/include.js"></script>

  <!-- 버튼 로더 -->
  <script src="/_common/button/button.js"></script>

  <!-- 버튼 생성 -->
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      loadButton({
        target: "#signup-button",
        text: "다음",
        variant: "primary",
        size: "md",
        onClick: () => {
          window.location.href = "/login3/login3.html";
          console.log("회원가입 버튼 클릭");
          document.getElementById("signupBtn")?.click();
        }
      });
    });
  </script>

  <!-- 페이지 로직 -->
  <script type="module" src="/login2/login2.js"></script>

</body>
</html>
