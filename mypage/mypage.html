<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이페이지 - TOOLOUD</title>

  <link rel="stylesheet" href="/_common/background.css">
  <link rel="stylesheet" href="/_common/top-banner/top-banner.css">
  <link rel="stylesheet" href="/_common/button/button.css">
  <link rel="stylesheet" href="/_common/icon/icon.css">
  <link rel="stylesheet" href="/_common/drop_down/drop_down.css">
  <link rel="stylesheet" href="/_common/alert/alert.css">
  <link rel="stylesheet" href="/mypage/mypage.css">
  <link rel="stylesheet" href="/_common/bottom-banner/bottom-banner.css">
</head>
<body>

  <div id="top-banner"></div>

  <main class="mypage-container">

    <!-- ===== 프로필 섹션 ===== -->
    <section class="profile-section">
      <h1 class="page-title">마이페이지</h1>
      <div class="profile-avatar-ring">
        <div class="profile-avatar" id="profileAvatarBtn" title="프로필 이미지 변경">
          <img id="profileAvatarImg" src="./media/profile.png" alt="프로필" onerror="this.style.display='none'">
          <div class="profile-avatar-edit-overlay">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
        </div>
      </div>
      <span class="profile-email-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
        
      </span>
    </section>

    <!-- ===== 대시보드 섹션 ===== -->
    <section class="dashboard-section" id="section-dashboard">
      <h2 class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="section-icon">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        대시보드
      </h2>
      <div class="dashboard-grid">

        <!-- 내 정보 -->
        <div class="dashboard-card card-info">
          <h3 class="card-title">내 정보</h3>
          <ul class="info-list">
            <li><span class="info-label">이름</span><span class="info-tag"></span></li>
            <li><span class="info-label">직군</span><span class="info-tag"></span></li>
            <li><span class="info-label">연령대</span><span class="info-tag"></span></li>
            <li><span class="info-label">국가</span><span class="info-tag"></span></li>
          </ul>
          <div class="card-footer">
            <button type="button" class="btn-text" data-scroll-to="section-faq-info">정보 수정하기</button>
          </div>
        </div>

        <!-- 최근 사용한 툴 -->
        <div class="dashboard-card card-recent">
          <h3 class="card-title">최근 사용한 툴</h3>
          <div class="card-tool-slider" id="recentToolSlider"></div>
          <div class="card-footer">
            <button type="button" class="btn-text" data-href="/personal_AI/personal_AI.html">최근 사용한 툴 더보기</button>
          </div>
        </div>

        <!-- 내가 쓴 리뷰 (3열, 1~2행 span) -->
        <div class="dashboard-card card-review">
          <h3 class="card-title">내가 쓴 리뷰</h3>
          <ul class="review-list" id="reviewList"></ul>
          <div class="card-footer">
            <button type="button" class="btn-text" data-scroll-to="section-review-manage">리뷰 관리하기</button>
          </div>
        </div>

        <!-- AI 추천 툴 -->
        <div class="dashboard-card card-ai">
          <h3 class="card-title">AI 추천 툴</h3>
          <div class="card-tool-slider" id="aiToolSlider"></div>
          <div class="card-footer">
            <button type="button" class="btn-text" data-href="/personal_AI/personal_AI.html">AI 추천 툴 더보기</button>
          </div>
        </div>

        <!-- 관심 있는 툴 -->
        <div class="dashboard-card card-favorite">
          <h3 class="card-title">관심 있는 툴</h3>
          <div class="card-tool-slider" id="favoriteToolSlider"></div>
          <div class="card-footer">
            <button type="button" class="btn-text" data-href="/personal_AI/personal_AI.html">관심 있는 툴 더보기</button>
          </div>
        </div>

      </div>
    </section>

    <!-- ===== 업로드한 작업물 섹션 ===== -->
    <section class="works-section" id="section-works">
      <h2 class="section-title">
        <img src="/media/upload1.png" width="20" height="20" style="object-fit:contain;">
        업로드한 작업물
      </h2>
      <div class="works-card">
        <div class="works-card-header">
          <div id="worksFilterSelect"></div>
        </div>
        <div id="worksContent"></div>
      </div>
    </section>

    <!-- ===== 리뷰 관리 섹션 ===== -->
    <section class="review-manage-section" id="section-review-manage">
      <h2 class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="section-icon">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        리뷰 관리
      </h2>
      <div class="review-manage-list" id="reviewManageList"></div>
    </section>

    <!-- ===== FAQ / 설정 드롭다운 섹션 ===== -->
    <section class="faq-section" id="section-faq">
      <div class="faq-list">

        <!-- 내 정보 수정 (스크롤 앵커) -->
        <div class="drop_down" data-drop_down id="section-faq-info">
          <button type="button" class="drop_down__trigger" data-faq-trigger aria-expanded="false" aria-controls="panel-info">
            <span class="drop_down__title">내 정보 수정하기</span>
            <span class="drop_down__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="drop_down__chevron"><path d="M7 14l5-5 5 5" fill="currentColor"></path></svg>
            </span>
          </button>
          <div id="panel-info" class="drop_down__panel" data-faq-panel role="region" aria-hidden="true">
            <div class="drop_down__content info-edit-form">

              <div class="edit-row">
                <span class="edit-label">닉네임</span>
                <div class="edit-input-wrap">
                  <input type="text" class="edit-input" id="editNickname" value="" placeholder="닉네임">
                  <div id="nicknameCheckContainer"></div>
                </div>
              </div>

              <div class="edit-row">
                <span class="edit-label">직군</span>
                <div class="edit-select-wrap" id="selectJobWrap"></div>
              </div>

              <div class="edit-row">
                <span class="edit-label">연령대</span>
                <div class="edit-select-wrap" id="selectAgeWrap"></div>
              </div>

              <div class="edit-row">
                <span class="edit-label">국가</span>
                <div class="edit-select-wrap" id="selectCountryWrap"></div>
              </div>

              <div class="edit-submit-row">
                <div id="infoSubmitContainer"></div>
              </div>

            </div>
          </div>
        </div>

        <!-- 1:1 문의 -->
        <div class="drop_down" data-drop_down>
          <button type="button" class="drop_down__trigger" data-faq-trigger aria-expanded="false" aria-controls="panel-inquiry">
            <span class="drop_down__title">1:1 문의하기</span>
            <span class="drop_down__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="drop_down__chevron"><path d="M7 14l5-5 5 5" fill="currentColor"></path></svg>
            </span>
          </button>
          <div id="panel-inquiry" class="drop_down__panel" data-faq-panel role="region" aria-hidden="true">
            <div class="drop_down__content">
              <div class="inquiry-wrapper">
                <p class="drop_down__desc">1:1 문의를 통해 고객센터에 직접 문의할 수 있습니다.</p>
                <div id="inquiryBtnContainer"></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- ===== 아바타 선택 모달 ===== -->
  <div class="avatar-modal-backdrop" id="avatarModalBackdrop" aria-hidden="true">
    <div class="avatar-modal" role="dialog" aria-modal="true" aria-label="프로필 이미지 선택">
      <div class="avatar-modal__header">
        <h3 class="avatar-modal__title">프로필 이미지 선택</h3>
        <button class="avatar-modal__close" id="avatarModalClose" aria-label="닫기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <p class="avatar-modal__desc">사용할 프로필 이미지를 선택해주세요.</p>
      <div class="avatar-grid" id="avatarGrid"></div>
      <div class="avatar-modal__footer">
        <div id="avatarCancelContainer"></div>
        <div id="avatarConfirmContainer"></div>
      </div>
    </div>
  </div>

  <div id="bottom-banner"></div>
  <div id="alert-root"></div>

  <script type="module" src="/_common/top-banner/include.js"></script>
  <script src="/_common/icon/icon.js"></script>
  <script src="/_common/alert/alert.js"></script>
  <script src="/_common/select/select.js"></script>
  <script src="/_common/button/button.js"></script>
  <script type="module" src="/mypage/mypage.js"></script>
  <script src="/_common/bottom-banner/include.js"></script>
</body>
</html>
