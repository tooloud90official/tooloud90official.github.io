<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Confirm Sample</title>
  <link rel="stylesheet" href="../button/button.css"/>
  <link rel="stylesheet" href="confirm.css"/>
</head>
<body>

  <!-- confirm 오버레이 -->
  <div class="confirm-overlay" id="confirmOverlay" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-hidden="true">
    <div class="confirm-backdrop" id="confirmBackdrop"></div>
    <div class="confirm-dialog">
      <div class="confirm-icon" id="confirmIcon"></div>
      <h2 class="confirm-title" id="confirmTitle"></h2>
      <p class="confirm-desc" id="confirmDesc"></p>
      <div class="confirm-actions">
        <div class="confirm-btn-slot" id="confirmBtnCancel"></div>
        <div class="confirm-btn-slot" id="confirmBtnOk"></div>
      </div>
    </div>
  </div>

  <!-- 트리거 버튼 슬롯 -->
  <div id="triggerBtn"></div>

  <script src="../button/button.js"></script>
  <script src="confirm.js"></script>
  <script>
    loadButton({
      target: '#triggerBtn',
      text: '삭제하기',
      variant: 'danger',
      size: 'md',
      onClick: () => showConfirm({
        type: 'danger',
        title: '삭제하시겠습니까?',
        desc: '이 작업은 취소할 수 없습니다.',
        confirmText: '삭제',
        cancelText: '취소',
      })
    });
  </script>
</body>
</html>
