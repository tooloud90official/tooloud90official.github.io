<div class="confirm-overlay" id="confirmOverlay"
     role="dialog" aria-modal="true"
     aria-labelledby="confirmTitle" aria-hidden="true">
  <div class="confirm-backdrop" id="confirmBackdrop"></div>
  <div class="confirm-dialog">
    <div class="confirm-body">
      <h2 class="confirm-title" id="confirmTitle">삭제하시겠습니까?</h2>
      <p class="confirm-desc" id="confirmDesc">이 작업은 취소할 수 없습니다.</p>
    </div>
    <div class="confirm-actions">
      <div class="confirm-btn-slot" id="confirmBtnCancel"></div>
      <div class="confirm-btn-slot" id="confirmBtnOk"></div>
    </div>
  </div>
</div>
