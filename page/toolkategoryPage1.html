<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>нҲҙ м№ҙлҚ°кі лҰ¬ нҺҳмқҙм§Җ</title>
  <style>
    :root{
      --bg: #f3f3f3;
      --folder: rgba(255,255,255,.75);
      --stroke: rgba(0,0,0,.08);
      --shadow: 0 20px 60px rgba(0,0,0,.18);
      --radius: 22px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(1200px 600px at 20% 10%, #ffffff, var(--bg));
      font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      color:#111;
    }

    /* ===== Layout ===== */
    .dock{
      display:flex;
      gap: 22px;
      align-items:flex-start;
      padding: 30px 18px;
    }

    .folder-wrap{ position: relative; }

    /* ===== Folder (collapsed) ===== */
    .folder{
      width: 132px;
      height: 132px;
      border-radius: var(--radius);
      background: var(--folder);
      border: 1px solid var(--stroke);
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
      padding: 14px;
      cursor: default;
      position: relative;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      user-select: none;
      transition: transform .18s ease;
    }
    .folder-wrap:hover .folder{ transform: scale(1.02); }

    .mini-grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      height: 100%;
      align-content: start;
      justify-items: center;
      padding-top: 6px;
    }
    .mini-icon{
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 6px 12px rgba(0,0,0,.08);
    }

    .folder-label{
      position:absolute;
      left:0;
      right:0;
      bottom:-34px;
      text-align:center;
      font-size:14px;
      opacity:.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 6px;
    }

    .overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      opacity: 0;
      pointer-events: none; /* н•ӯмғҒ none */
      transition: opacity .18s ease;
      z-index: 10;
    }
    .overlay.open{
      opacity: 1;
      pointer-events: none; /* openмқҙм–ҙлҸ„ none мң м§Җ */
    }

    /* ===== Panel ===== */
    .panel{
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateY(10px) scale(.94);
      width: min(560px, 92vw);
      height: min(440px, 78vh);
      border-radius: 28px;
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      transition: transform .22s ease, opacity .22s ease;
      padding: 18px;
      z-index: 20;
      pointer-events: none;

      /* вң… мҠӨнҒ¬лЎӨ мҳҒм—ӯ л§Ңл“Өкё° мң„н•ң flex */
      display: flex;
      flex-direction: column;
      gap: 6px;

      /* вң… нҢЁл„җ м•Ҳм—җ лӘЁлӢ¬ мҳ¬лҰҙкұ°лқј relative */
      position: fixed;
    }
    .panel.open{
      transform: translate(-50%, -50%) translateY(0) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .panel-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      padding: 6px 6px 6px 6px;
      flex: 0 0 auto;
    }
    .panel-title{
      font-size:16px;
      font-weight: 650;
      letter-spacing: .2px;
    }
    .hint{
      font-size: 12px;
      opacity: .6;
      margin-top: 4px;
    }

    /* вң… м•ұ к·ёлҰ¬л“ң: нҢЁл„җ м•Ҳ мҠӨнҒ¬лЎӨ */
    .apps{
      flex: 1 1 auto;           /* лӮЁлҠ” лҶ’мқҙ мӮ¬мҡ© */
      overflow: auto;           /* вң… м—¬кё° мҠӨнҒ¬лЎӨ */
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      padding: 8px 6px 12px 6px;
      align-content: start;
    }
    @media (max-width: 520px){
      .apps{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    /* (м„ нғқ) мҠӨнҒ¬лЎӨл°” мӮҙм§қ мҳҲмҒҳкІҢ */
    .apps::-webkit-scrollbar{ width: 10px; }
    .apps::-webkit-scrollbar-thumb{
      background: rgba(0,0,0,.14);
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,.6);
    }
    .apps::-webkit-scrollbar-track{ background: transparent; }

    .app{
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,.08);
      background: rgba(255,255,255,.75);
      padding: 14px 12px;
      cursor: pointer;
      display:flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .app:hover{
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(0,0,0,.12);
    }
    .app:active{ transform: translateY(0) scale(.99); }

    .app-icon{
      width: 64px;
      height: 64px;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
    }
    .app-name{ font-size: 14px; opacity: .95; }

    .app-rate{
      font-size: 12px;
      opacity: .65;
      text-align:center;
      line-height: 1.35;
    }

    .app-desc{
      font-size: 12px;
      opacity: .65;
      text-align:center;
      line-height: 1.35;
    }

    /* вң… лҚ”ліҙкё° лІ„нҠј */
    .more-btn{
      margin-top: 2px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 650;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      box-shadow: 0 10px 18px rgba(37, 99, 235, .25);
      transition: transform .15s ease, filter .15s ease;
    }
    .more-btn:hover{
      transform: translateY(-1px);
      filter: brightness(1.05);
    }
    .more-btn:active{
      transform: translateY(0) scale(.99);
    }

    /* вң… нҢЁл„җ лӮҙл¶Җ нҢқм—…(лӘЁлӢ¬) */
    .app-modal{
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: rgba(0,0,0,.18);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 30;
    }
    .app-modal.open{ display: flex; }

    .app-modal-card{
      width: min(420px, 92%);
      border-radius: 20px;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 20px 60px rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 16px 16px 14px 16px;
    }
    .app-modal-top{
      display:flex;
      align-items:flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .app-modal-title{
      font-size: 15px;
      font-weight: 750;
    }
    .app-modal-msg{
      font-size: 13px;
      opacity: .75;
      line-height: 1.45;
      margin-top: 6px;
    }
    .x-btn{
      border: 0;
      background: rgba(0,0,0,.06);
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .modal-actions{
      display:flex;
      justify-content:flex-end;
      gap: 10px;
      margin-top: 14px;
    }
    .ghost-btn{
      border: 1px solid rgba(0,0,0,.12);
      background: rgba(255,255,255,.8);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 650;
    }
    .primary-btn{
      border: 0;
      background: #2563eb;
      color: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 750;
    }

    @media (prefers-reduced-motion: reduce){
      .overlay, .panel, .folder, .more-btn, .app { transition: none; }
    }
  </style>
</head>

<body>
  <h2>м№ҙн…Ңкі лҰ¬ нҺҳмқҙм§Җ</h2>
  <div class="dock" id="dock"></div>

  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <!-- нҢЁл„җ(кіөмҡ© н•ҳлӮҳл§Ң) -->
  <div class="panel" id="panel" role="dialog" aria-modal="false" aria-label="Folder Panel">
    <div class="panel-header">
      <div>
        <div class="panel-title" id="panelTitle">Folder</div>
        <div class="hint">мқҙлҜём§Җ мғқм„ұм—җ нҠ№нҷ”лҗң AI</div>
      </div>
    </div>

    <div class="apps" id="panelApps"></div>

    <!-- вң… нҢЁл„җ лӮҙл¶Җ нҢқм—… -->
    <div class="app-modal" id="appModal" aria-hidden="true">
      <div class="app-modal-card">
        <div class="app-modal-top">
          <div>
            <div class="app-modal-title" id="modalTitle">м ңлӘ©</div>
            <div class="app-modal-msg" id="modalMsg">лӮҙмҡ©</div>
          </div>
          <button class="x-btn" id="modalX" type="button">вң•</button>
        </div>

        <div class="modal-actions">
          <button class="ghost-btn" id="modalClose" type="button">лӢ«кё°</button>
          <button class="primary-btn" id="modalAction" type="button">нҷ•мқё</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // вң… нҸҙлҚ” лҚ°мқҙн„° (мӣҗн•ҳл©ҙ лӮҳмӨ‘м—җ runUrl/detailUrl м—°кІ°)
    const folders = [
      {
        title: "мқҙлҜём§Җ мғқм„ұ",
        apps: [
          { name: "App A", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "мқҙлҜём§Җ мғқм„ұм—җ мөңм Ғнҷ”", grad: "linear-gradient(135deg,#ff6b6b,#ffd93d)" },
          { name: "App B", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "к№”лҒ”н•ң UI/UX", grad: "linear-gradient(135deg,#5f6cff,#7df9ff)" },
          { name: "App C", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "кі нҷ”м§Ҳ мқҙлҜём§Җ мғқм„ұм—җ мөңм Ғнҷ”лҗң мң нӢёлҰ¬нӢ°", grad: "linear-gradient(135deg,#7c3aed,#f472b6)" },
        ],
      },
      {
        title: "мҳҒмғҒ мғқм„ұ",
        apps: [
          { name: "App D", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "н•ңмӨ„ мҶҢк°ң", grad: "linear-gradient(135deg,#34d399,#a7f3d0)" },
          { name: "App E", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "н•ңмӨ„ мҶҢк°ң", grad: "linear-gradient(135deg,#fb7185,#fecdd3)" },
          { name: "App F", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "н•ңмӨ„ мҶҢк°ң", grad: "linear-gradient(135deg,#f59e0b,#fde68a)" },
          { name: "App G", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "н•ңмӨ„ мҶҢк°ң", grad: "linear-gradient(135deg,#60a5fa,#bfdbfe)" },
        ],
      },
      {
        title: "мҳӨл””мҳӨ мғқм„ұ",
        apps: [
          { name: "App H", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "н•ңмӨ„ мҶҢк°ң", grad: "linear-gradient(135deg,#a78bfa,#ddd6fe)" },
          { name: "App I", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "н•ңмӨ„ мҶҢк°ң", grad: "linear-gradient(135deg,#22c55e,#bbf7d0)" },
          { name: "App J", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "н•ңмӨ„ мҶҢк°ң", grad: "linear-gradient(135deg,#f97316,#fed7aa)" },
          { name: "App K", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "н•ңмӨ„ мҶҢк°ң", grad: "linear-gradient(135deg,#06b6d4,#a5f3fc)" },
          { name: "App L", rate: "вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ", desc: "н•ңмӨ„ мҶҢк°ң", grad: "linear-gradient(135deg,#64748b,#cbd5e1)" },
        ],
      },
    ];

    const dock = document.getElementById('dock');
    const overlay = document.getElementById('overlay');
    const panel = document.getElementById('panel');
    const panelTitle = document.getElementById('panelTitle');
    const panelApps = document.getElementById('panelApps');

    // лӘЁлӢ¬
    const appModal = document.getElementById('appModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalMsg = document.getElementById('modalMsg');
    const modalX = document.getElementById('modalX');
    const modalClose = document.getElementById('modalClose');
    const modalAction = document.getElementById('modalAction');

    let closeTimer = null;
    let modalState = { type: null, appName: null };

    function showModal(type, appName){
      modalState = { type, appName };

      if(type === 'run'){
        modalTitle.textContent = "м•ұ мӢӨн–ү";
        modalMsg.textContent = `"${appName}" мӢӨн–ү л§ҒнҒ¬лЎң мқҙлҸҷн•  мҳҲм •мқҙм—җмҡ”. (м§ҖкёҲмқҖ нҢқм—…л§Ң)`;
        modalAction.textContent = "мӢӨн–ү";
      } else {
        modalTitle.textContent = "мғҒм„ё ліҙкё°";
        modalMsg.textContent = `"${appName}" мғҒм„ёнҺҳмқҙм§ҖлЎң мқҙлҸҷн•  мҳҲм •мқҙм—җмҡ”. (м§ҖкёҲмқҖ нҢқм—…л§Ң)`;
        modalAction.textContent = "мғҒм„ёлЎң";
      }

      appModal.classList.add('open');
      appModal.setAttribute('aria-hidden', 'false');
      clearTimeout(closeTimer); // лӘЁлӢ¬ м—ҙл ӨмһҲмңјл©ҙ лӢ«нһҳ л°©м§Җ
    }

    function hideModal(){
      appModal.classList.remove('open');
      appModal.setAttribute('aria-hidden', 'true');
      modalState = { type: null, appName: null };
    }

    modalX.addEventListener('click', hideModal);
    modalClose.addEventListener('click', hideModal);

    // лӘЁлӢ¬ л°°кІҪ нҒҙлҰӯн•ҳл©ҙ лӢ«кё° (м№ҙл“ң нҒҙлҰӯ л°©м§Җ)
    appModal.addEventListener('click', (e) => {
      if(e.target === appModal) hideModal();
    });

    // лӘЁлӢ¬ нҷ•мқё лІ„нҠј (лӮҳмӨ‘м—җ л§ҒнҒ¬ м—°кІ° мң„м№ҳ)
    modalAction.addEventListener('click', () => {
      const { type, appName } = modalState;

      if(type === 'run'){
        // вң… лӮҳмӨ‘м—җ м—°кІ° мҳҲ:
        // location.href = `/run/${encodeURIComponent(appName)}`;
        alert(`[мӢӨн–ү] ${appName} (м—¬кё°м—җ мӢӨн–ү л§ҒнҒ¬ м—°кІ°)`);
      } else if(type === 'detail'){
        // вң… лӮҳмӨ‘м—җ м—°кІ° мҳҲ:
        // location.href = `/detail/${encodeURIComponent(appName)}`;
        alert(`[мғҒм„ё] ${appName} (м—¬кё°м—җ мғҒм„ё нҺҳмқҙм§Җ л§ҒнҒ¬ м—°кІ°)`);
      }

      hideModal();
    });

    function openFolder(folder){
      clearTimeout(closeTimer);

      panelTitle.textContent = folder.title;

      // вң… м№ҙл“ң нҒҙлҰӯ(мӢӨн–ү) + лҚ”ліҙкё° лІ„нҠј(мғҒм„ё) л¶„лҰ¬
      panelApps.innerHTML = folder.apps.map(app => `
        <div class="app" data-app="${app.name}">
          <div class="app-icon" style="background:${app.grad}"></div>
          <div class="app-name">${app.name}</div>
          <div class="app-rate">${app.rate}</div>
          <div class="app-desc">${app.desc}</div>

          <button class="more-btn" type="button" data-app="${app.name}">лҚ”ліҙкё°</button>
        </div>
      `).join("");

      overlay.classList.add('open');
      panel.classList.add('open');

      // вң… м№ҙл“ң(м•„мқҙмҪҳ/нғҖмқј) нҒҙлҰӯ = мӢӨн–ү нҢқм—…
      panelApps.querySelectorAll('.app').forEach(card => {
        card.addEventListener('click', () => {
          const appName = card.dataset.app;
          showModal('run', appName);
        });
      });

      // вң… лҚ”ліҙкё° нҒҙлҰӯ = мғҒм„ё нҢқм—… (м№ҙл“ң нҒҙлҰӯмңјлЎң лІҲм§Җм§Җ м•ҠкІҢ)
      panelApps.querySelectorAll('.more-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const appName = btn.dataset.app;
          showModal('detail', appName);
        });
      });
    }

    function scheduleClose(){
      clearTimeout(closeTimer);
      closeTimer = setTimeout(() => {
        if(appModal.classList.contains('open')) return; // вң… лӘЁлӢ¬ м—ҙл ӨмһҲмңјл©ҙ м•Ҳ лӢ«нһҳ
        overlay.classList.remove('open');
        panel.classList.remove('open');
      }, 120);
    }

    function renderFolders(){
      dock.innerHTML = folders.map((f, idx) => {
        const minis = f.apps.slice(0, 9).map(a =>
          `<div class="mini-icon" style="background:${a.grad}"></div>`
        ).join("");

        return `
          <div class="folder-wrap" data-idx="${idx}">
            <div class="folder" aria-label="${f.title}">
              <div class="mini-grid" aria-hidden="true">${minis}</div>
              <div class="folder-label">${f.title}</div>
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll('.folder-wrap').forEach(wrap => {
        const idx = Number(wrap.dataset.idx);
        wrap.addEventListener('mouseenter', () => openFolder(folders[idx]));
        wrap.addEventListener('mouseleave', scheduleClose);
      });
    }

    // нҢЁл„җ hover мң м§Җ
    panel.addEventListener('mouseenter', () => clearTimeout(closeTimer));
    panel.addEventListener('mouseleave', scheduleClose);

    renderFolders();

    function isInside(el, x, y){
      if (!el) return false;
      const r = el.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    }

    document.addEventListener('mousemove', (e) => {
      if (!panel.classList.contains('open')) return;

      // вң… лӘЁлӢ¬мқҙ м—ҙл ӨмһҲмңјл©ҙ лӢ«нһҳ л°©м§Җ
      if(appModal.classList.contains('open')){
        clearTimeout(closeTimer);
        return;
      }

      const insidePanel = isInside(panel, e.clientX, e.clientY);
      const insideFolder = !!e.target.closest('.folder-wrap');

      if (insidePanel || insideFolder) {
        clearTimeout(closeTimer);
      } else {
        scheduleClose();
      }
    });
  </script>
</body>
</html>
