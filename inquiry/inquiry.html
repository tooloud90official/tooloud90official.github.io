<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의사항</title>

  <link rel="stylesheet" href="/_common/background.css">
  <link rel="stylesheet" href="/inquiry/inquiry.css" />
  <link rel="stylesheet" href="/_common/top-banner/top-banner.css" />
  <link rel="stylesheet" href="/_common/drop_down/drop_down.css" />
  <link rel="stylesheet" href="/_common/button/button.css" />
  <link rel="stylesheet" href="/_common/bottom-banner/bottom-banner.css">
</head>
<body>
  <!-- 상단 배너 -->
  <div id="top-banner" class="inquiry-banner-root"></div>

  <div class="inquiry-page">
    <main class="inquiry-main">
      <!-- 타이틀 -->
      <section class="inquiry-hero">
        <h1 class="inquiry-hero__title">문의사항</h1>
        <p class="inquiry-hero__desc">궁금하거나 불편한 점을 알려주세요.</p>
      </section>

      <!-- FAQ -->
      <section class="inquiry-section">
        <h2 class="inquiry-section__title">Frequently Asked Questions</h2>
        <div id="faqList" class="inquiry-faq-list"></div>
      </section>

      <!-- 문의한 내용 -->
      <section class="inquiry-section">
        <h2 class="inquiry-section__title">문의한 내용</h2>
        <div id="myInquiryList" class="inquiry-faq-list"></div>
      </section>

      <!-- Contact us -->
      <section class="inquiry-section">
        <h2 class="inquiry-section__title">Contact us</h2>

        <div class="inquiry-contact-wrap">
          <textarea
            id="contactMessage"
            class="inquiry-contact-textarea"
            placeholder="문의사항을 입력해주세요. (답변은 영업일 기준 3~5일 정도 소요될 수 있습니다.)"
          ></textarea>
        </div>
      </section>

      <!-- 버튼 -->
      <div class="inquiry-submit-wrap">
        <div id="submitBtn"></div>
      </div>
    </main>
  </div>

  <div id="bottom-banner"></div>

  <script src="/_common/button/button.js"></script>
  <script src="/_common/top-banner/include.js"></script>
  <script type="module" src="/inquiry/inquiry.js"></script>
  <script src="/_common/bottom-banner/include.js"></script>
</body>
</html>
