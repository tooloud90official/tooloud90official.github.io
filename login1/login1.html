<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
  
    <link rel="stylesheet" href="/_common/background.css">
    <link rel="stylesheet" href="/_common/button/button.css">
    <link rel="stylesheet" href="/login1/login1.css">
</head>

<body>

    <header class="login-header">
      <div class="login-logo" onclick="window.location.href='/'">
        <img src="/_common/top-banner/media/logo.png" alt="로고">
      </div>
    </header>


    <main class="login-page">
        <h1 class="login-title">오늘도 함께 시작해볼까요?</h1>

        <div class="login-form">
            <input type="email" id="email" class="login-input" placeholder="이메일 입력창" />
            <p id="emailError" class="field-error"></p>

            <input type="password" id="password" class="login-input" placeholder="비밀번호 입력창" />
            <p id="passwordError" class="field-error"></p>

            <div class="login-options">
                <label class="remember">
                    <input type="checkbox" id="remember">
                    로그인 유지
                </label>
                <button class="text-btn" id="resetPw">비밀번호 재설정하기</button>
            </div>

            <!-- 로그인 버튼 -->
            <div id="loginBtnContainer"></div>

            <!-- 소셜 로그인 구분선 -->
            <div class="social-divider">
                <span>또는</span>
            </div>

            <!-- 소셜 로그인 버튼 (button 컴포넌트 활용) -->
            <div id="googleBtnContainer"></div>
            <div id="appleBtnContainer"></div>

            <!-- 회원가입 텍스트 링크 -->
            <div class="signup-text">
                <span>계정이 없나요?</span>
                <button class="text-link-btn" id="signupLink">가입하기</button>
            </div>

        </div>
    </main>

    <script src="/_common/button/button.js"></script>
    <script src="/login1/login1.js"></script>

</body>
</html>
