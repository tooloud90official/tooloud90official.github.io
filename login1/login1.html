<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <link rel="stylesheet" href="../../common/top-banner/top-banner.css">
    <link rel="stylesheet" href="../../common/button/button.css">
    <link rel="stylesheet" href="../css/login1.css">
</head>

<body>

    <div id="top-banner"></div>

    <main class="login-page">
        <h1 class="login-title">로그인</h1>

        <div class="login-form">
            <input type="email" id="email" class="login-input" placeholder="이메일 입력창" />
            <input type="password" id="password" class="login-input" placeholder="비밀번호 입력창" />

            <div class="login-options">
                <label class="remember">
                    <input type="checkbox" id="remember">
                    로그인 유지
                </label>
                <button class="text-btn" id="resetPw">비밀번호 재설정하기</button>
            </div>
            
            <div id="loginError" class="login-error"></div>

            <div id="loginBtnContainer">
                <button type="button" class="btn btn-primary full-width" id="loginBtn">로그인</button>
            </div>

            <div class="social-login">
                <button class="social google" id="googleLogin">
                    <img src="../media/googleLogo.svg" alt="Google 로그인">
                </button>
                <button class="social apple" id="appleLogin">
                    <img src="../media/appleLogo.svg" alt="Apple 로그인">
                </button>
            </div>

            <div id="signupBtnContainer">
                <button type="button" class="btn btn-outline full-width" id="signupBtn">회원가입</button>
            </div>

        </div>
    </main>

    <script src="../../common/top-banner/include.js"></script>
    <script src="../../common/button/button.js"></script>
    <script src="../js/login1.js"></script>

</body>
</html>
