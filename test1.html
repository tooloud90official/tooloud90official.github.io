<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini 태그 매칭 테스트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #7c6ef7;
      --accent2: #4fd1c5;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    .title {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: var(--text);
    }

    .input-wrap {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1.1rem;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.4rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      display: none;
    }

    .result-box.visible { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .result-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .tag-group { margin-bottom: 1.1rem; }
    .tag-group:last-child { margin-bottom: 0; }

    .tag-group-title {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .tag {
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .tag.cat {
      background: rgba(124, 110, 247, 0.15);
      border: 1px solid rgba(124, 110, 247, 0.4);
      color: #a99bf9;
    }

    .tag.subcat {
      background: rgba(79, 209, 197, 0.1);
      border: 1px solid rgba(79, 209, 197, 0.35);
      color: #6de8dc;
    }

    .raw {
      margin-top: 1.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
    }

    .raw pre {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .error {
      color: #f87171;
      font-size: 0.88rem;
      margin-top: 0.5rem;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <p class="title">Gemini API · Tag Matcher</p>
    <h1>태그 매칭 테스트</h1>

    <div class="input-wrap">
      <input type="text" id="query" placeholder="예: 이미지 생성하고 싶어" />
      <button id="btn" onclick="run()">테스트</button>
    </div>

    <p class="error" id="err"></p>

    <div class="result-box" id="result">
      <p class="result-label">Result</p>
      <div class="tag-group">
        <p class="tag-group-title">대분류 (tool_cat)</p>
        <div class="tags" id="cats"></div>
      </div>
      <div class="tag-group">
        <p class="tag-group-title">소분류 (tool_subcat)</p>
        <div class="tags" id="subcats"></div>
      </div>
      <div class="raw">
        <pre id="raw"></pre>
      </div>
    </div>
  </div>

  <script type="module">
    import { matchCategories } from '/_ignore/groq.js'

    window.run = async function() {
      const input = document.getElementById('query').value.trim()
      if (!input) return

      const btn = document.getElementById('btn')
      const err = document.getElementById('err')
      const result = document.getElementById('result')

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>분석 중'
      err.style.display = 'none'
      result.classList.remove('visible')

      try {
        const data = await matchCategories(input)

        const catLabels = {
          media: '이미지/오디오/영상', res: '리서치', doc: '문서',
          dev: '개발/코딩', edu: '학습/교육', ast: '챗봇/어시스턴트'
        }
        const subcatLabels = {
          img_gen: '이미지 생성', img_edit: '이미지 편집',
          vid_gen: '영상 생성', vid_edit: '영상 편집',
          aud_gen: '음성 생성', aud_edit: '오디오 편집',
          res_paper: '논문 리서치', res_img: '이미지 리서치', res_shop: '쇼핑 리서치',
          doc_gen: '문서 생성', doc_sum: '문서 요약', doc_edit: '문서 편집',
          dev_gen: '코드 생성', dev_bld: '웹/앱 빌더',
          edu_lan: '언어', edu_supp: '학습 보조',
          ast_gen: '범용 AI', ast_work: '워크플로우/협업'
        }

        document.getElementById('cats').innerHTML =
          data.tool_cat.map(c => `<span class="tag cat">${c} · ${catLabels[c] ?? c}</span>`).join('')

        document.getElementById('subcats').innerHTML =
          data.tool_subcat.map(s => `<span class="tag subcat">${s} · ${subcatLabels[s] ?? s}</span>`).join('')

        document.getElementById('raw').textContent = JSON.stringify(data, null, 2)
        result.classList.add('visible')

      } catch (e) {
        err.textContent = '오류: ' + e.message
        err.style.display = 'block'
      }

      btn.disabled = false
      btn.innerHTML = '테스트'
    }

    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.run()
    })
  </script>
</body>
</html>
