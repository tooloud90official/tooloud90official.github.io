<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리별 AI 툴 - TOOLOUD</title>

  <link rel="stylesheet" href="/_common/background.css">
  <link rel="stylesheet" href="/_common/top-banner/top-banner.css">
  <link rel="stylesheet" href="/_common/icon/icon.css">
  <link rel="stylesheet" href="/_common/select/select.css">
  <link rel="stylesheet" href="category.css">
</head>
<body>

  <div id="top-banner"></div>

  <main class="category-container">
    <h1 class="page-title">AI 툴 탐색, 더 쉽고 빠르게</h1>

    <nav class="category-tabs" id="categoryTabs">
      <button class="tab-item active">이미지·오디오·영상</button>
      <button class="tab-item">리서치</button>
      <button class="tab-item">문서 생성·요약·편집</button>
      <button class="tab-item">개발·코딩</button>
      <button class="tab-item">학습·교육</button>
      <button class="tab-item">챗봇·어시스턴트</button>
    </nav>

    <div class="tool-grid" id="toolGrid"></div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <div class="modal-header">
        <div class="header-left">
          <h2 id="modalTitle">카테고리명</h2>
          <span class="total-count" id="modalTotalCount">전체 (0)</span>
        </div>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>

      <div class="modal-body" id="modalList">

        <!-- ✅ 필터 select -->
        <div class="modal-list-header">
          <div class="select modal-sort-select" id="modalSortSelect">
            <button class="select__trigger" data-select-trigger aria-expanded="false">
              <span class="select__value" data-select-value>이름 순</span>
              <span class="select__icon">
                <svg class="select__chevron" viewBox="0 0 20 20" fill="none"
                  xmlns="http://www.w3.org/2000/svg">
                  <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor"
                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </button>
            <div class="select__menu-wrap">
              <ul class="select__menu" data-select-menu aria-hidden="true" role="listbox">
                <li class="select__option" data-select-option data-value="name">이름 순</li>
                <li class="select__option" data-select-option data-value="rating">평점 순</li>
              </ul>
            </div>
          </div>
        </div>

        <!-- ✅ 툴 목록 렌더링 영역 -->
        <div id="toolList"></div>

      </div>
    </div>
  </div>

  <script src="/_common/top-banner/include.js"></script>
  <script src="/_common/icon/icon.js"></script>
  <script type="module" src="category.js"></script>
</body>
</html>
