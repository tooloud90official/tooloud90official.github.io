<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>추가 정보 입력</title>

  <link rel="stylesheet" href="./_common/background.css">
  <link rel="stylesheet" href="./_common/signup_status/signup_status.css">
  <link rel="stylesheet" href="./_common/confirm/confirm.css">
  <link rel="stylesheet" href="/_common/button/button.css">
  <link rel="stylesheet" href="./_common/select/select.css">
  <link rel="stylesheet" href="./login3.css">
  <link rel="stylesheet" href="./_common/bottom-banner/bottom-banner.css">
</head>

<body>

  <header class="login-header">
    <div class="login-logo" onclick="window.location.href='/main1/main1.html'">
      <img src="./_common/top-banner/media/logo.png" alt="로고">
    </div>
  </header>

  <div id="signup-status" data-step="2"></div>

  <main class="signup-container">

    <h1 class="title">추가 정보를 입력해주세요.</h1>
    <p class="subtitle">입력해주신 정보를 바탕으로 AI 툴을 추천해드립니다.</p>

    <!-- 닉네임 -->
    <div class="form-group">
      <label>사용할 닉네임을 알려주세요.</label>
      <div class="input-with-button">
        <input type="text" id="nickname" class="custom-input" placeholder="닉네임 입력">
        <button type="button" class="btn btn-outline" id="check-duplicate-btn">중복 확인</button>
      </div>
      <p class="field-msg" id="nickname-msg"></p>
    </div>

    <!-- 직군 -->
    <div class="form-group">
      <label>현재 종사하시는 직군을 알려주세요.</label>
      <div id="job-select-wrap"></div>
    </div>

    <!-- 연령대 -->
    <div class="form-group">
      <label>연령대를 알려주세요.</label>
      <div id="age-select-wrap"></div>
    </div>

    <!-- 국가 -->
    <div class="form-group">
      <label>국가를 알려주세요.</label>
      <div id="country-select-wrap"></div>
    </div>

    <div id="signup-button"></div>
    <div class="back-link" id="backBtn">이전으로 돌아가기</div>

  </main>
  <div id="bottom-banner"></div>

  <div id="modal-root"></div>

  <script src="./_common/confirm/include.js"></script>
  <script src="./_common/confirm/confirm.js"></script>
  <script src="./_common/signup_status/include.js"></script>
  <script src="./_common/button/button.js"></script>
  <script type="module" src="../login3/login3.js"></script>
  <script src="./_common/bottom-banner/include.js"></script>
</body>
</html>
