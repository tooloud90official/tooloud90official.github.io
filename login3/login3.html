<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>추가 정보 입력</title>

  <link rel="stylesheet" href="/_common/background.css">
  <link rel="stylesheet" href="/_common/signup_status/signup_status.css">
  <link rel="stylesheet" href="/_common/confirm/confirm.css">
  <link rel="stylesheet" href="/_common/button/button.css">
  <link rel="stylesheet" href="/_common/select/select.css">
  <link rel="stylesheet" href="./login3.css">
</head>

<body>

  <header class="login-header">
    <div class="login-logo" onclick="window.location.href='/'">
      <img src="/_common/top-banner/media/logo.png" alt="로고">
    </div>
  </header>

  <!-- signup_status: login2와 동일한 위치 고정 -->
  <div id="signup-status" data-step="2"></div>

  <main class="signup-container">

    <h1 class="title">추가 정보를 입력해주세요.</h1>
    <p class="subtitle">입력해주신 정보를 바탕으로 AI 툴을 추천해드립니다.</p>

    <!-- 닉네임 -->
    <div class="form-group">
      <label>사용할 닉네임을 알려주세요.</label>
      <div class="input-with-button">
        <input type="text" id="nickname" class="custom-input" placeholder="닉네임 입력">
        <button type="button" class="btn btn-outline" id="check-duplicate-btn">중복 확인</button>
      </div>
      <p class="field-msg" id="nickname-msg"></p>
    </div>

    <!-- 직군 -->
    <div class="form-group">
      <label>현재 종사하시는 직군을 알려주세요.</label>
      <div class="select" id="job-select-wrap" role="combobox">
        <button class="select__trigger" data-select-trigger aria-expanded="false">
          <span class="select__value" data-select-value>선택 해주세요</span>
          <span class="select__arrow">▾</span>
        </button>
        <div class="select__menu-wrap" data-select-menu-wrap>
          <ul class="select__menu" data-select-menu role="listbox">
            <li class="select__option" data-select-option data-value="developer">개발자</li>
            <li class="select__option" data-select-option data-value="designer">디자이너</li>
            <li class="select__option" data-select-option data-value="planner">기획자</li>
            <li class="select__option" data-select-option data-value="marketer">마케터</li>
            <li class="select__option" data-select-option data-value="writer">작가/크리에이터</li>
            <li class="select__option" data-select-option data-value="student">학생</li>
            <li class="select__option" data-select-option data-value="etc">기타</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 생년월일 -->
    <div class="form-group">
      <label>나이를 알려주세요. (태어난 연, 월, 일)</label>
      <div class="date-select-group">

        <!-- 연도 -->
        <div class="select" id="birth-year-wrap" role="combobox">
          <button class="select__trigger" data-select-trigger aria-expanded="false">
            <span class="select__value" data-select-value>연도</span>
            <span class="select__arrow">▾</span>
          </button>
          <div class="select__menu-wrap" data-select-menu-wrap>
            <ul class="select__menu" data-select-menu role="listbox"></ul>
          </div>
        </div>

        <!-- 월 -->
        <div class="select" id="birth-month-wrap" role="combobox">
          <button class="select__trigger" data-select-trigger aria-expanded="false">
            <span class="select__value" data-select-value>월</span>
            <span class="select__arrow">▾</span>
          </button>
          <div class="select__menu-wrap" data-select-menu-wrap>
            <ul class="select__menu" data-select-menu role="listbox"></ul>
          </div>
        </div>

        <!-- 일 -->
        <div class="select" id="birth-day-wrap" role="combobox">
          <button class="select__trigger" data-select-trigger aria-expanded="false">
            <span class="select__value" data-select-value>일</span>
            <span class="select__arrow">▾</span>
          </button>
          <div class="select__menu-wrap" data-select-menu-wrap>
            <ul class="select__menu" data-select-menu role="listbox"></ul>
          </div>
        </div>

      </div>
    </div>

    <!-- 국가 -->
    <div class="form-group">
      <label>국가를 알려주세요.</label>
      <div class="select" id="country-select-wrap" role="combobox">
        <button class="select__trigger" data-select-trigger aria-expanded="false">
          <span class="select__value" data-select-value>선택 해주세요</span>
          <span class="select__arrow">▾</span>
        </button>
        <div class="select__menu-wrap" data-select-menu-wrap>
          <ul class="select__menu" data-select-menu role="listbox">
            <li class="select__option" data-select-option data-value="KR">대한민국</li>
            <li class="select__option" data-select-option data-value="US">미국</li>
            <li class="select__option" data-select-option data-value="JP">일본</li>
            <li class="select__option" data-select-option data-value="CN">중국</li>
            <li class="select__option" data-select-option data-value="GB">영국</li>
            <li class="select__option" data-select-option data-value="ETC">기타</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 다음 버튼 (login2와 동일한 구조) -->
    <div id="signup-button"></div>

    <!-- 이전으로 돌아가기 (login2와 동일한 구조) -->
    <div class="back-link" id="backBtn">이전으로 돌아가기</div>

  </main>

  <!-- confirm 모달 -->
  <div id="modal-root"></div>

  <script src="/_common/confirm/include.js"></script>
  <script src="/_common/confirm/confirm.js"></script>
  <script src="/_common/signup_status/include.js"></script>
  <script src="/_common/button/button.js"></script>
  <script type="module" src="/login3/login3.js"></script>

</body>
</html>
