<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>추가 정보 입력</title>

  <link rel="stylesheet" href="../../common/top-banner/top-banner.css">
  <link rel="stylesheet" href="../../common/signup_status/signup_status.css">
  <link rel="stylesheet" href="../../common/confirm/confirm.css">
  <link rel="stylesheet" href="../../common/button/button.css">
  <link rel="stylesheet" href="../../common/select/select.css">
  <link rel="stylesheet" href="./login3.css">
</head>

<body>

  <div id="top-banner"></div>
  <div id="signup-status" data-step="2"></div>

  <main class="signup-container">

    <h1 class="title">추가 정보 입력</h1>
    <p class="subtitle">입력해주신 정보를 바탕으로 AI 툴을 추천해드립니다.</p>

    <form id="additional-info-form">

      <!-- 닉네임 -->
      <div class="form-group">
        <label>사용할 닉네임을 알려주세요.</label>
        <div class="input-with-button">
          <input type="text" id="nickname" class="custom-input" placeholder="닉네임 입력">
          <button type="button" class="btn btn-primary" id="check-duplicate-btn">중복 확인 버튼</button>
        </div>
        <p class="field-msg" id="nickname-msg"></p>
      </div>

      <!-- 직군 -->
      <div class="form-group">
        <label>현재 종사하시는 직군을 알려주세요.</label>
        <div class="select" data-select id="job-select-wrap">
          <button type="button" class="select__trigger" data-select-trigger
            aria-haspopup="listbox" aria-expanded="false" aria-controls="job-select-list">
            <span class="select__value" data-select-value>선택 해주세요</span>
            <span class="select__icon" aria-hidden="true">
              <svg class="select__chevron" viewBox="0 0 24 24">
                <path d="M6 9l6 6 6-6Z" fill="currentColor"></path>
              </svg>
            </span>
          </button>
          <div class="select__menu-wrap" data-select-menu-wrap>
            <ul id="job-select-list" class="select__menu" data-select-menu
              role="listbox" tabindex="-1" aria-hidden="true">
              <li class="select__option" data-select-option data-value="developer" role="option" aria-selected="false" tabindex="-1">개발자</li>
              <li class="select__option" data-select-option data-value="designer" role="option" aria-selected="false" tabindex="-1">디자이너</li>
              <li class="select__option" data-select-option data-value="planner" role="option" aria-selected="false" tabindex="-1">기획자</li>
              <li class="select__option" data-select-option data-value="marketer" role="option" aria-selected="false" tabindex="-1">마케터</li>
              <li class="select__option" data-select-option data-value="writer" role="option" aria-selected="false" tabindex="-1">작가/크리에이터</li>
              <li class="select__option" data-select-option data-value="student" role="option" aria-selected="false" tabindex="-1">학생</li>
              <li class="select__option" data-select-option data-value="etc" role="option" aria-selected="false" tabindex="-1">기타</li>
            </ul>
          </div>
        </div>
      </div>

      <!-- 생년월일 -->
      <div class="form-group">
        <label>나이를 알려주세요. (태어난 연, 월, 일)</label>
        <div class="date-select-group">

          <!-- 연도 -->
          <div class="select" data-select id="birth-year-wrap">
            <button type="button" class="select__trigger" data-select-trigger
              aria-haspopup="listbox" aria-expanded="false" aria-controls="birth-year-list">
              <span class="select__value" data-select-value>선택</span>
              <span class="select__icon" aria-hidden="true">
                <svg class="select__chevron" viewBox="0 0 24 24">
                  <path d="M6 9l6 6 6-6Z" fill="currentColor"></path>
                </svg>
              </span>
            </button>
            <div class="select__menu-wrap" data-select-menu-wrap>
              <ul id="birth-year-list" class="select__menu" data-select-menu
                role="listbox" tabindex="-1" aria-hidden="true">
              </ul>
            </div>
          </div>

          <!-- 월 -->
          <div class="select" data-select id="birth-month-wrap">
            <button type="button" class="select__trigger" data-select-trigger
              aria-haspopup="listbox" aria-expanded="false" aria-controls="birth-month-list">
              <span class="select__value" data-select-value>선택</span>
              <span class="select__icon" aria-hidden="true">
                <svg class="select__chevron" viewBox="0 0 24 24">
                  <path d="M6 9l6 6 6-6Z" fill="currentColor"></path>
                </svg>
              </span>
            </button>
            <div class="select__menu-wrap" data-select-menu-wrap>
              <ul id="birth-month-list" class="select__menu" data-select-menu
                role="listbox" tabindex="-1" aria-hidden="true">
              </ul>
            </div>
          </div>

          <!-- 일 -->
          <div class="select" data-select id="birth-day-wrap">
            <button type="button" class="select__trigger" data-select-trigger
              aria-haspopup="listbox" aria-expanded="false" aria-controls="birth-day-list">
              <span class="select__value" data-select-value>선택</span>
              <span class="select__icon" aria-hidden="true">
                <svg class="select__chevron" viewBox="0 0 24 24">
                  <path d="M6 9l6 6 6-6Z" fill="currentColor"></path>
                </svg>
              </span>
            </button>
            <div class="select__menu-wrap" data-select-menu-wrap>
              <ul id="birth-day-list" class="select__menu" data-select-menu
                role="listbox" tabindex="-1" aria-hidden="true">
              </ul>
            </div>
          </div>

        </div>
      </div>

      <!-- 국가 -->
      <div class="form-group">
        <label>국가를 알려주세요.</label>
        <div class="select" data-select id="country-select-wrap">
          <button type="button" class="select__trigger" data-select-trigger
            aria-haspopup="listbox" aria-expanded="false" aria-controls="country-select-list">
            <span class="select__value" data-select-value>선택 해주세요</span>
            <span class="select__icon" aria-hidden="true">
              <svg class="select__chevron" viewBox="0 0 24 24">
                <path d="M6 9l6 6 6-6Z" fill="currentColor"></path>
              </svg>
            </span>
          </button>
          <div class="select__menu-wrap" data-select-menu-wrap>
            <ul id="country-select-list" class="select__menu" data-select-menu
              role="listbox" tabindex="-1" aria-hidden="true">
              <li class="select__option" data-select-option data-value="KR" role="option" aria-selected="false" tabindex="-1">대한민국</li>
              <li class="select__option" data-select-option data-value="US" role="option" aria-selected="false" tabindex="-1">미국</li>
              <li class="select__option" data-select-option data-value="JP" role="option" aria-selected="false" tabindex="-1">일본</li>
              <li class="select__option" data-select-option data-value="CN" role="option" aria-selected="false" tabindex="-1">중국</li>
              <li class="select__option" data-select-option data-value="GB" role="option" aria-selected="false" tabindex="-1">영국</li>
              <li class="select__option" data-select-option data-value="ETC" role="option" aria-selected="false" tabindex="-1">기타</li>
            </ul>
          </div>
        </div>
      </div>

      <!-- 하단 버튼 -->
      <div class="form-actions">
        <button type="button" class="btn btn-outline" id="cancel-btn">취소</button>
        <button type="submit" class="btn btn-primary" id="submit-btn">확인</button>
      </div>

    </form>
  </main>

  <script src="../../common/top-banner/include.js"></script>
  <script src="../../common/signup_status/include.js"></script>
  <script type="module" src="./login3.js"></script>

</body>
</html>
