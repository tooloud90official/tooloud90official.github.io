<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tool Hero Section</title>

  <link rel="stylesheet" href="/_common/background.css">
  <link rel="stylesheet" href="/_common/top-banner/top-banner.css" />
  <link rel="stylesheet" href="/_common/select/select.css" />
  <link rel="stylesheet" href="/_common/icon/icon.css" />
  <link rel="stylesheet" href="/_common/button/button.css" />
  <link rel="stylesheet" href="/detail_AI/detail_AI.css" />
  <link rel="stylesheet" href="/_common/bottom-banner/bottom-banner.css">

  <!-- ✅ pdf.js -->
  <script type="module">
    import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@4.6.82/build/pdf.min.mjs";
  
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs";
  
    window.pdfjsLib = pdfjsLib;
  </script>
</head>

<body>
  <div class="detail_AI-page">
    <div id="top-banner" class="detail_AI-banner-root"></div>

    <main class="detail_AI-main">
      <!-- ===== 섹션 탭 (맨 위) ===== -->
      <div class="section-tabs" id="sectionTabs" aria-label="페이지 섹션 탭">
        <button class="section-tab is-active" data-target="belowContent">툴 기본 정보</button>
        <button class="section-tab" data-target="sitePreview">사이트 미리보기</button>
        <button class="section-tab" data-target="planCompare">플랜 비교하기</button>
        <button class="section-tab" data-target="reviewSection">평점 및 리뷰 보기</button>
        <button class="section-tab" data-target="similarTools">유사 AI툴 추천</button>
      </div>

      <!-- ===== 상단: 툴 정보 + 프로필/작업물 ===== -->
      <section class="detail_AI">
        <!-- LEFT: 툴 정보 -->
        <article class="detail_AI__tool-card">
          <div id="toolIconMount"></div>

          <div class="detail_AI__meta">
            <p class="detail_AI__tool-brand" id="toolBrand"></p>
            <div class="detail_AI__stars" aria-label="별점" id="toolStars"></div>
            <div class="detail_AI__divider"></div>
            <p class="detail_AI__tool-desc" id="toolDesc"></p>
          </div>

          <div class="detail_AI__btns">
            <div id="visitSiteBtn"></div>
            <div id="wishlistBtn"></div>
          </div>
        </article>

        <!-- RIGHT: 프로필 + 작업물 -->
        <article class="detail_AI__showcase">
          <div class="detail_AI__profile">
            <div class="detail_AI__avatar">
              <img id="profileImg" src="" alt="프로필" style="display:none" />
            </div>
            <div class="detail_AI__profile-meta">
              <div class="detail_AI__profile-name" id="profileName"></div>
            </div>
          </div>

          <div class="detail_AI__carousel">
            <div class="detail_AI__work-actions">
              <button class="detail_AI__more-btn" id="workMoreBtn">작업물 더보기</button>
              <a class="detail_AI__work-link" href="/artwork/artwork.html">
                <img src="/media/upload.png" class="detail_AI__upload-icon" alt="">
                작업물 올리기
              </a>
            </div>

            <div class="detail_AI__carousel-wrapper">
              <!-- ✅ JS가 타입별로 미디어를 여기에 삽입 -->
              <div class="detail_AI__work-media" id="workMediaContainer"></div>


            </div>

            <div class="detail_AI__dots" aria-label="캐러셀 페이지" id="workDots"></div>
          </div>
        </article>
      </section>

      <!-- ===== 아래 섹션들 ===== -->
      <section class="detail_AI-below" id="belowContent">
        <!-- ===== 사이트 미리보기 섹션 ===== -->
        <section class="site-preview" id="sitePreview">
          <div class="site-preview__header">
            <span class="site-preview__line" aria-hidden="true"></span>
            <h2 class="site-preview__title">사이트 미리보기</h2>
            <span class="site-preview__line" aria-hidden="true"></span>
          </div>

          <article class="site-preview__card">
            <div class="site-preview__media">
              <img id="sitePreviewLogo" src="" alt="logo"
                style="display:none; max-width: 200px; max-height: 120px; object-fit: contain;">
            </div>
            <div class="site-preview__meta">
              <div class="site-preview__name" id="sitePreviewName"></div>
              <a class="site-preview__url" id="sitePreviewUrl" href="" target="_blank" rel="noopener"></a>
            </div>
          </article>
        </section>
      </section>

      <!-- ===== 플랜 비교 섹션 ===== -->
      <section class="plan-compare" id="planCompare">
        <div class="plan-compare__header">
          <span class="plan-compare__line" aria-hidden="true"></span>
          <h2 class="plan-compare__title">플랜 비교</h2>
          <span class="plan-compare__line" aria-hidden="true"></span>
        </div>

        <div class="plan-compare__grid">
          <article class="plan-card plan-card--active">
            <div class="plan-card__top">
              <div class="plan-card__badge" id="planBadge1"></div>
              <div class="plan-card__name" id="planName1"></div>
            </div>
            <ul class="plan-card__list" id="planList1"></ul>
            <div class="plan-card__btn" id="planBtn1"></div>
          </article>

          <article class="plan-card">
            <div class="plan-card__top">
              <div class="plan-card__badge" id="planBadge2"></div>
              <div class="plan-card__name" id="planName2"></div>
            </div>
            <ul class="plan-card__list" id="planList2"></ul>
            <div class="plan-card__btn" id="planBtn2"></div>
          </article>

          <article class="plan-card">
            <div class="plan-card__top">
              <div class="plan-card__badge" id="planBadge3"></div>
              <div class="plan-card__name" id="planName3"></div>
            </div>
            <ul class="plan-card__list" id="planList3"></ul>
            <div class="plan-card__btn" id="planBtn3"></div>
          </article>
        </div>
      </section>

      <!-- ===== 프로모션 섹션 ===== -->
      <section class="promo" id="promoSection">
        <h3 class="promo__title" id="promoTitle"></h3>
        <p class="promo__hint" id="promoHint"></p>

        <article class="promo-banner">
          <div class="promo-banner__left">
            <div class="promo-banner__headline" id="promoHeadline"></div>
            <div class="promo-banner__sub" id="promoSub"></div>
            <div class="promo-banner__date" id="promoDate"></div>
          </div>
          <div class="promo-banner__right" id="promoBtn"></div>
        </article>
      </section>

      <!-- ===== 평점 및 리뷰 섹션 ===== -->
      <section class="review-section" id="reviewSection">
        <div class="review-section__header">
          <span class="review-section__line" aria-hidden="true"></span>
          <h2 class="review-section__title">평점 및 리뷰</h2>
          <span class="review-section__line" aria-hidden="true"></span>
        </div>

        <div class="review-section__score">
          <div class="review-section__score-num" id="avgScoreNum"></div>
          <div class="review-section__score-stars" aria-label="평점 별점" id="avgScoreStars"></div>
        </div>

        <div class="review-panel">
          <aside class="review-write">
            <div class="review-write__head">
              <div class="review-write__title">리뷰 쓰기</div>
            </div>
            <div class="review-write__box">
              <div class="review-write__stars" aria-label="내 별점" id="writeStars">
                <span class="rstar-input" data-val="1">★</span>
                <span class="rstar-input" data-val="2">★</span>
                <span class="rstar-input" data-val="3">★</span>
                <span class="rstar-input" data-val="4">★</span>
                <span class="rstar-input" data-val="5">★</span>
                <span class="review-write__hint" id="writeStarHint">(0점)</span>
              </div>
              <textarea class="review-write__textarea" id="reviewTextarea"
                placeholder="리뷰를 작성해주세요." maxlength="300"></textarea>
            </div>
            <div class="review-write__submit" id="reviewSubmitBtn"></div>
          </aside>

          <div class="review-list">
            <div class="review-list__top">
              <div class="review-list__count" id="reviewCount"></div>
              <div class="review-sort" id="reviewSortSelect"></div>
            </div>
            <div class="review-cards" id="reviewCards"></div>
            <div class="review-dots" aria-label="리뷰 페이지" id="reviewDots"></div>
          </div>
        </div>
      </section>

      <!-- ===== 유사 AI 툴 추천 ===== -->
      <section class="similar-tools" id="similarTools">
        <div class="similar-tools__header">
          <span class="similar-tools__line" aria-hidden="true"></span>
          <h2 class="similar-tools__title">유사 AI 툴 추천</h2>
          <span class="similar-tools__line" aria-hidden="true"></span>
        </div>

        <div class="similar-tools__row" id="similarToolsRow">
          <div class="similar-tools__item"><div class="similar-tools__mount" id="simTool1"></div></div>
          <div class="similar-tools__item"><div class="similar-tools__mount" id="simTool2"></div></div>
          <div class="similar-tools__item"><div class="similar-tools__mount" id="simTool3"></div></div>
          <div class="similar-tools__item"><div class="similar-tools__mount" id="simTool4"></div></div>
        </div>

        <div class="similar-tools__dots" aria-label="유사 툴 페이지" id="similarToolsDots"></div>
      </section>
    </main>
  </div>

  <div id="bottom-banner"></div>

  <script src="/_common/icon/icon.js"></script>
  <script src="/_common/button/button.js"></script>
  <script type="module" src="/_common/top-banner/include.js"></script>
  <script type="module" src="/detail_AI/detail_AI.js"></script>
  <script src="/_common/bottom-banner/include.js"></script>
</body>
</html>
