<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관심 툴 추가</title>

  <link rel="stylesheet" href="/_common/background.css">
  <link rel="stylesheet" href="/_common/signup_status/signup_status.css">
  <link rel="stylesheet" href="/_common/button/button.css">
  <link rel="stylesheet" href="/_common/icon/icon.css">
  <link rel="stylesheet" href="/login4/login4.css">
</head>

<body>
  <header class="login-header">
    <div class="login-logo" onclick="window.location.href='/'">
      <img src="/_common/top-banner/media/logo.png" alt="로고">
    </div>
  </header>

  <!-- login2,3과 동일한 위치 -->
  <div id="signup-status" data-step="3"></div>

  <main class="login4-container">

    <h1 class="title">관심 있는 AI 툴을 골라주세요.</h1>
    <p class="subtitle">최대 5개의 툴을 선택해주세요.</p>

    <!-- 툴 그리드 -->
    <div class="tool-grid-wrap">
      <div class="tool-grid" id="toolGrid"></div>
    </div>

    <!-- 선택된 툴 -->
    <div class="selected-wrap">
      <h2 class="selected-title">지금까지 선택한 툴</h2>

      <div class="selected-progress-bar">
        <div class="selected-progress-fill" id="progressFill"></div>
      </div>

      <div class="selected-icons" id="selectedIcons"></div>

      <p class="selected-count" id="selectedCount">0/5</p>

      <button type="button" class="btn btn-outline" id="finishBtn">
        선택 마치기
      </button>
    </div>

  </main>

  <script src="/_common/signup_status/include.js"></script>
  <script src="/_common/icon/icon.js"></script>
  <script type="module" src="/login4/login4.js"></script>

</body>
</html>
